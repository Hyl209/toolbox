name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ['3.12']
        test-file:
          - tests/tests_core.py
          - tests/tests_mp4_converter.py
          - tests/tests_name_converter.py
          - tests/tests_pdf_spec.py
          - tests/tests_performance.py
          - tests/tests_same_converter.py
          - tests/tests_services.py
          - tests/tests_tab_utils.py
          - tests/tests_tool_pages.py
          - tests/tests_tool_registry.py
          - tests/tests_toolbox.py
          - tests/tests_分类_converter.py

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        run: |
          python -m pytest "${{ matrix.test-file }}" -x --tb=short -q --basetemp="$env:RUNNER_TEMP/pytest-hyl"
        env:
          QT_QPA_PLATFORM: offscreen
